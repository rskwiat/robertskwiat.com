name: Delete Branch after Merge

on:
  pull_request:
    types: [closed]

jobs:
  delete-branch:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    permissions:
      contents: write
    
    steps:
      - name: Delete branch
        uses: SvanBoxel/delete-merged-branch@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}